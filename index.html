<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teste</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/carrossel.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="./js/index.js" defer></script>
    <script src="./js/carrossel.js" defer></script>
</head>

<body>
    <header>
        <div class="container-logo">
            <img src="./images/logo-loja.png" alt="logo da loja" class="logo-image">
            <strong><span class="name-one">Book</span><span class="name-two">Verse</span></strong>
        </div>

        <div class="container-search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="search" placeholder="Buscar por título ou autor...">
        </div>
        <div class="container-cart">
            <i class="fa-solid fa-cart-shopping"></i>
        </div>
    </header>
    <main>
        <section class="slide">
            <div class="slides">
                <img src="./images/banner-leitura-aconchegante.jpg" alt="Livro aberto com ilustrações de mundos fantásticos saindo das páginas" class="active">
                <img src="./images/biblioteca.png" alt="Biblioteca">
                <img src="./images/promo-novos-titulos.png" alt="Mesa de madeira com um livro aberto e uma xícara de café ao lado, criando um ambiente acolhedor para a leitura">
            </div>

            <div class="buttons">
                <span class="next">&#10095;</span>
                <span class="prev">&#10094;</span>
            </div>

            <div class="dots-container">
                <div class="dot active" attr="0" onclick="switchImage(this)"></div>
                <div class="dot" attr="1" onclick="switchImage(this)"></div>
                <div class="dot" attr="2" onclick="switchImage(this)"></div>
            </div>
        </section>

        <section class="categories">
            <div class="interface">
                <div>
                    <span>Categoria</span>
                </div>
    
                <div>
                    <button>Todos</button>
                    <button>Romance</button>
                    <button>Ficção cientifica</button>
                    <button>Fantasia</button>
                    <button>Biografia</button>
                    <button>Auto Ajuda</button>
                </div>
            </div>
        </section>

        <section class="books">
            <div class="interface">
                <div>
                    <span>20 livros encontrados</span>
                </div>
    
                <div class="book-container" id="book-container">
                    
                </div>
            </div>
        </section>

        <footer>
            Footer
        </footer>
    </main>
</body>

</html>
